server {
    listen 80;
    server_name api.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    client_max_body_size 100m;

    location = /ping {
        proxy_pass http://127.0.0.1:5100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Optional hardening for private deployments.
        #
        # Prefer a custom header for this service because the upstream API
        # requires Authorization: Bearer <sessionid>.
        if ($http_x_jmapi_key != "REPLACE_WITH_RANDOM_SECRET") {
            return 401;
        }
        #
        # IP allowlist can be combined with the custom header:
        # allow 203.0.113.10;
        # deny all;

        proxy_pass http://127.0.0.1:5100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3700s;
        proxy_read_timeout 3700s;
        send_timeout 3700s;
    }
}
