services:
  jmapi:
    image: ghcr.io/nardinmarcus/jmapi:latest
    container_name: jmapi
    restart: unless-stopped
    environment:
      SERVER_ENV: prod
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5100
    ports:
      - "127.0.0.1:5100:5100"
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
      - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5100/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
